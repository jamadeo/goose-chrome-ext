<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Open GitHub PR in Goose — Settings</title>
        <style>
            :root {
                color-scheme: light dark;
                --fg: #1f2328;
                --bg: #ffffff;
                --muted: #57606a;
                --border: rgba(31, 35, 40, 0.15);
                --accent: #1f6feb;
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --fg: #e6edf3;
                    --bg: #0d1117;
                    --muted: #8b949e;
                    --border: rgba(240, 246, 252, 0.1);
                }
            }
            html,
            body {
                margin: 0;
                padding: 0;
                background: var(--bg);
                color: var(--fg);
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                font-size: 14px;
            }
            .wrap {
                padding: 24px;
                box-sizing: border-box;
                max-width: 640px;
                margin: 0 auto;
            }
            h1 {
                font-size: 16px;
                margin: 0 0 16px;
            }
            label {
                display: block;
                font-weight: 600;
                margin-bottom: 6px;
            }
            .hint {
                color: var(--muted);
                font-size: 12px;
                margin-bottom: 8px;
            }
            textarea {
                width: 100%;
                box-sizing: border-box;
                padding: 8px 10px;
                font-size: 13px;
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                border: 1px solid var(--border);
                border-radius: 6px;
                background: var(--bg);
                color: var(--fg);
                height: 220px;
                resize: vertical;
                line-height: 1.4;
            }
            textarea:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.3);
            }
            code {
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                background: rgba(175, 184, 193, 0.2);
                padding: 1px 4px;
                border-radius: 3px;
                font-size: 12px;
            }
            .actions {
                margin-top: 16px;
                display: flex;
                align-items: center;
                gap: 12px;
            }
            button {
                padding: 6px 14px;
                font-size: 13px;
                font-weight: 600;
                border: 1px solid var(--border);
                border-radius: 6px;
                background: var(--accent);
                color: #fff;
                cursor: pointer;
            }
            button:hover {
                filter: brightness(1.1);
            }
            #status {
                color: var(--muted);
                font-size: 12px;
                opacity: 0;
                transition: opacity 0.2s ease;
            }
            #status.show {
                opacity: 1;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <h1>Open GitHub PR in Goose — Settings</h1>

            <label for="prompt">Prompt</label>
            <div class="hint">
                The prompt sent to Goose when opening a PR. Use
                <code>&lt;PR LINK&gt;</code> as a placeholder — it will be
                replaced with the full URL of the PR.
            </div>
            <textarea
                id="prompt"
                placeholder="Review the PR at <PR LINK> and summarize the changes."
                spellcheck="false"
            ></textarea>

            <div class="actions">
                <button id="save" type="button">Save</button>
                <span id="status">Saved ✓</span>
            </div>
        </div>
        <script src="options.js"></script>
    </body>
</html>
