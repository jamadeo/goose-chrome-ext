<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Stylized goose head -->
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f7fa"/>
      <stop offset="100%" stop-color="#c3cfe2"/>
    </linearGradient>
  </defs>
  <!-- Neck/body -->
  <path d="M22 56 C 18 44, 18 34, 24 26 C 30 18, 42 16, 50 22 C 44 24, 38 28, 36 36 C 34 44, 32 52, 30 56 Z"
        fill="url(#bodyGrad)" stroke="#1f2328" stroke-width="2" stroke-linejoin="round"/>
  <!-- Head -->
  <ellipse cx="46" cy="22" rx="12" ry="9" fill="url(#bodyGrad)" stroke="#1f2328" stroke-width="2"/>
  <!-- Beak -->
  <path d="M56 22 L 64 20 L 56 26 Z" fill="#ff9a3c" stroke="#1f2328" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Eye -->
  <circle cx="48" cy="20" r="1.8" fill="#1f2328"/>
</svg>
